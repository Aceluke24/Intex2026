name: Nightly ML Pipelines

on:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC nightly
  workflow_dispatch:

jobs:
  run-pipelines:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install ODBC driver for Azure SQL
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql18 unixodbc-dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r jobs/requirements.txt

      - name: Train donor retention model
        run: python jobs/train_donor_retention.py

      - name: Train resident risk model
        run: python jobs/train_resident_risk.py

      - name: Train social media insights
        run: python jobs/train_social_media_insights.py

      - name: Train reintegration analysis
        run: python jobs/train_reintegration_analysis.py

      - name: Score donors
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DB: ${{ secrets.AZURE_SQL_DB }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: python jobs/score_donors.py

      - name: Score resident risk
        env:
          AZURE_SQL_SERVER: ${{ secrets.AZURE_SQL_SERVER }}
          AZURE_SQL_DB: ${{ secrets.AZURE_SQL_DB }}
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}
        run: python jobs/score_resident_risk.py
